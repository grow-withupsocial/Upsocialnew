<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - UpSocial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .signup-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 700;
        }
        .logo .highlight { color: #3CB371; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #3CB371;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #3CB371;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .error {
            background: #ff4444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }
        .success {
            background: #3CB371;
            color: #000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
        .login-link a {
            color: #3CB371;
            text-decoration: none;
        }
        .loading {
            display: none;
            text-align: center;
            margin-bottom: 15px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="signup-box">
        <div class="logo">Up<span class="highlight">Social</span></div>
        <h2>Create Account</h2>
        
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <div class="loading" id="loading">Creating your account...</div>

        <form id="signupForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required minlength="6">
            <button type="submit" id="submitBtn">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        // API URL - your Render backend
        const API_URL = 'https://upsocial-api.onrender.com/api';

        // Show error message
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        // Show success message
        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        // Handle form submit
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Stop page from reloading
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');

            // Show loading, disable button
            loading.style.display = 'block';
            btn.disabled = true;

            try {
                // Send data to your Render API
                const response = await fetch(API_URL + '/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Signup failed
                    throw new Error(data.error || 'Signup failed');
                }

                // Success! Save token and user
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                showSuccess('Account created! Redirecting...');

                // Go to dashboard after 1 second
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (err) {
                showError(err.message);
            } finally {
                // Hide loading, enable button
                loading.style.display = 'none';
                btn.disabled = false;
            }
        });
    </script>

</body>
</html>
